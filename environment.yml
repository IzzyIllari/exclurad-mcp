# Conda environment for building and running EXCLURAD plus the MCP server.
# Ships gfortran so the Fortran builds identically on macOS/Linux without
# system compilers:
#
#   conda env create -f environment.yml
#   conda activate exclurad
#   pip install -e .                       # this package (exclurad-mcp)
#   cd /path/to/exclurad/exclurad && make  # builds build/exclurad
#
name: exclurad
channels:
  - conda-forge
dependencies:
  - python=3.12
  - gfortran
  - make
  - pip
  - pytest
  - pip:
      - mcp>=1.2
